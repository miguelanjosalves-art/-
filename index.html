<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ARQUIVO_CORROMPIDO_00.EXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #d1d1d1;
            font-family: 'Special Elite', serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Overlay de interferência (opcional, dá um clima de TV velha) */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
        }

        /* CONFIGURAÇÃO DOS OLHOS (GIF) */
        .eye-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0; /* Começa invisível */
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }

        .eye-gif {
            position: absolute;
            width: 120px; /* Tamanho do olho */
            filter: grayscale(100%) contrast(150%); /* Deixa o GIF mais sombrio */
        }

        /* Posições variadas para os olhos */
        .pos1 { top: 10%; left: 10%; transform: rotate(-15deg); }
        .pos2 { top: 15%; right: 15%; transform: rotate(10deg); width: 150px; }
        .pos3 { bottom: 20%; left: 5%; transform: scaleX(-1); }
        .pos4 { bottom: 10%; right: 10%; width: 100px; }

        .active { opacity: 1 !important; }

        /* INTERFACE */
        .content {
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 1px solid #333;
        }

        h1 {
            font-size: 3rem;
            color: #ff0000;
            margin-bottom: 10px;
            text-shadow: 2px 2px 5px #000;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #888;
        }

        button {
            font-family: 'Special Elite', serif;
            background: transparent;
            color: #ff0000;
            border: 1px solid #ff0000;
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="eyeLayer" class="eye-overlay">
        <img src="https://media.tenor.com/aPUrybBOMpIAAAAi/ojo.gif" class="eye-gif pos1">
        <img src="https://media.tenor.com/aPUrybBOMpIAAAAi/ojo.gif" class="eye-gif pos2">
        <img src="https://media.tenor.com/aPUrybBOMpIAAAAi/ojo.gif" class="eye-gif pos3">
        <img src="https://media.tenor.com/aPUrybBOMpIAAAAi/ojo.gif" class="eye-gif pos4">
    </div>

    <div id="menuScreen" class="content">
        <h1>PROJETO S.E.R.</h1>
        <p>Aviso: O conteúdo a seguir é estritamente confidencial.</p>
        <button onclick="entrar()">EXECUTAR ACESSO</button>
    </div>

    <div id="gameScreen" class="content hidden">
        <h1>INFECÇÃO DETECTADA</h1>
        <p>Eles já estão aqui. Não olhe para trás.</p>
        <button onclick="voltar()" style="color: #666; border-color: #666;">ABORTAR</button>
    </div>

    <script>
        const eyeLayer = document.getElementById('eyeLayer');
        const menu = document.getElementById('menuScreen');
        const game = document.getElementById('gameScreen');

        function entrar() {
            menu.classList.add('hidden');
            game.classList.remove('hidden');
            // Ativa o fade-in dos olhos
            eyeLayer.classList.add('active');
        }

        function voltar() {
            game.classList.add('hidden');
            menu.classList.remove('hidden');
            // Remove os olhos
            eyeLayer.classList.remove('active');
        }
    </script>
</body>
</html>
